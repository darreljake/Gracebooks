<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GraceBooks — Financial Reports</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="auth.js"></script>
<script>requireGraceBooksAuth();</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --red:      #8B0000;
      --red-mid:  #c0392b;
      --red-light:#fdf2f2;
      --gold:     #c9a84c;
      --dark:     #1a1a1a;
      --gray:     #555;
      --line:     #ccc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f2f5;
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── TOPBAR ─────────────────────────────────────────────── */
    .topbar {
      background: var(--red);
      color: white;
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 3px 15px rgba(0,0,0,0.25);
      position: sticky; top: 0; z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand img { height: 46px; }
    .brand-text { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .brand-sub  { font-size: 11px; opacity: 0.75; letter-spacing: 0.5px; }

    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-action {
      padding: 8px 14px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      color: white; transition: 0.2s; font-family: 'Poppins', sans-serif;
    }
    .btn-action:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-back   { background: rgba(255,255,255,0.15); }
    .btn-excel  { background: #1e8449; }
    .btn-print  { background: #1a5276; }
    .btn-fullscreen { background: #5a2a7a; }

    /* ── CONTROLS ───────────────────────────────────────────── */
    .controls-bar {
      background: white;
      padding: 16px 28px;
      display: flex; gap: 14px; flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #e0e0e0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .controls-bar label { font-size: 12px; font-weight: 600; color: var(--gray); }
    .controls-bar select {
      padding: 8px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 13px; background: white;
      font-family: 'Poppins', sans-serif;
    }
    .controls-bar select:focus { outline: none; border-color: var(--red); }
    .report-type-tabs {
      display: flex; gap: 6px;
    }
    .rtype-btn {
      padding: 7px 16px; border: 2px solid #ddd;
      border-radius: 20px; background: white;
      font-size: 12px; font-weight: 600; cursor: pointer;
      color: var(--gray); transition: 0.2s;
      font-family: 'Poppins', sans-serif;
    }
    .rtype-btn.active {
      background: var(--red); color: white; border-color: var(--red);
    }

    /* ── MODAL STYLES (For Signatories) ─────────────────────── */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
    .modal-content { background:white; padding:30px; border-radius:12px; width:600px; max-width:95%; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
    .modal-header { font-size:18px; font-weight:700; margin-bottom:5px; border-bottom:1px solid #ddd; padding-bottom:10px; color:var(--dark); }
    .modal-footer { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
    .btn-cancel { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-weight:600; background:#eee; color:#333; }
    .btn-save { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-weight:600; background:var(--red); color:white; }
    
    .sig-header-label { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 8px; margin-top: 15px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
    .sig-grid { display: grid; grid-template-columns: 1fr 1.5fr 1.5fr; gap: 10px; margin-bottom: 10px; }
    .sig-grid label { font-size: 11px; color: var(--gray); font-weight: 600; margin-bottom: 3px; display: block; }
    .sig-grid input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Poppins', sans-serif; font-size: 13px; }

    /* ── REPORT WRAPPER ─────────────────────────────────────── */
    .report-wrapper {
      max-width: 860px;
      margin: 28px auto;
      padding: 0 20px 60px;
    }

    /* ── REPORT PAGE (Printable) ────────────────────────────── */
    .report-page {
      background: white;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 48px 56px;
      position: relative;
    }
    .report-page::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: linear-gradient(to bottom, var(--red), var(--red-mid));
    }

    .fullscreen-toolbar {
      display: none;
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 2000;
      gap: 8px;
      align-items: center;
      background: rgba(26,26,26,0.9);
      color: white;
      padding: 8px;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }
    .fs-tool-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.14);
      color: white;
      cursor: pointer;
      font-size: 13px;
    }
    .fs-tool-btn:hover { background: rgba(255,255,255,0.24); }
    .fs-zoom-label {
      min-width: 52px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
    }
    body.report-fullscreen {
      overflow: auto;
      background: #1a1a1a;
    }
    body.report-fullscreen .topbar,
    body.report-fullscreen .controls-bar {
      display: none;
    }
    body.report-fullscreen .fullscreen-toolbar {
      display: flex;
    }
    body.report-fullscreen .report-wrapper {
      max-width: none;
      min-height: 100vh;
      margin: 0;
      padding: 56px 24px 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
    }
    body.report-fullscreen .report-page {
      transform: scale(var(--report-zoom, 1));
      transform-origin: top center;
      margin-bottom: 40px;
    }

    /* ── REPORT HEADER ──────────────────────────────────────── */
    .rpt-header {
      display: flex;
      align-items: center; 
      gap: 20px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--red);
    }
    .rpt-header img { height: 70px; }
    .rpt-header-text { flex: 1; text-align: center; }
    .rpt-church-name {
      font-family: 'EB Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--red);
    }
    .rpt-church-address { font-size: 11px; color: var(--gray); margin-top: 2px; }
    .rpt-title { font-size: 14px; font-weight: 700; color: var(--dark); text-transform: uppercase; margin-top: 10px; }
    .rpt-period { font-size: 12px; color: var(--gray); margin-top: 2px; }

    /* ── SIKSIK LAYOUT CONTAINER ────────────────────────────── */
    .siksik-container {
      max-width: 500px;
      margin: 0 auto;
    }

    /* ── FINANCIAL STATEMENT TABLE ──────────────── */
    .fs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    .fs-table td {
      padding: 2.5px 4px;
      vertical-align: top;
      line-height: 1.5;
    }
    .col-desc { width: 60%; color: #111; }
    .col-sub  { width: 20%; text-align: right; padding-right: 12px; color: var(--gray); }
    .col-main { width: 20%; text-align: right; font-weight: 600; }
    .indent-1 { padding-left: 18px !important; font-weight: 600; }
    .indent-2 { padding-left: 36px !important; color: #111; font-size: 12px; }
    .indent-3 { padding-left: 54px !important; color: #222; font-size: 11.5px; }

    .section-header td {
      font-weight: 700;
      font-size: 12.5px;
      text-transform: uppercase;
      padding-top: 14px !important;
      padding-bottom: 4px !important;
      color: var(--red);
      border-bottom: 1px solid var(--red);
    }

    .bold-row td { font-weight: 700; }
    .subtotal-row td { font-weight: 700; border-top: 1px solid var(--line); padding-top: 4px !important; }
    .total-row td {
      font-weight: 700; font-size: 13px; border-top: 2px solid var(--dark);
      border-bottom: 3px double var(--dark); padding-top: 5px !important; padding-bottom: 5px !important; color: var(--dark);
    }
    .spacer-row td { padding: 5px 0 !important; }

    .amount-positive { color: #1e8449; }
    .amount-negative { color: var(--red-mid); }

    /* ── SIGNATURES ──────────────────────────────────────────── */
    .sig-section { margin-top: 60px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .sig-box { text-align: center; flex: 1 1 145px; max-width: 180px; }
    .workflow-sig-space { height: 48px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 3px; }
    .workflow-sig-img { max-width: 155px; max-height: 46px; object-fit: contain; display: block; filter: brightness(0); }
    .workflow-sig-line { border-top: 1px solid var(--dark); margin-bottom: 2px; }
    .workflow-sig-manual { font-size: 9px; color: #777; padding-bottom: 5px; }
    .workflow-sig-unavailable { font-size: 9px; color: #777; padding-bottom: 5px; }
    
    /* ── FOOTER ──────────────────────────────────────────────── */
    .rpt-footer {
      margin-top: 32px; padding-top: 12px; border-top: 1px solid #eee;
      display: flex; justify-content: space-between; font-size: 10px; color: #aaa;
    }

    /* ── PRINT STYLES ───────────────────────────────────────── */

    /* Default: Long Bond 8.5 x 13 */
    @page { size: 8.5in 13in; margin: 0.6in 0.65in; }

    /* Letter 8.5 x 11 — activated when <body> has class 'paper-letter' */
    body.paper-letter { --paper: letter; }
    @media print {
      body.paper-letter { }
    }
    /* Swap @page size via a dedicated stylesheet injected by JS */

    @media print {
      .topbar, .controls-bar, .fullscreen-toolbar, .no-print { display: none !important; }
      body { background: white; }
      .report-wrapper { margin: 0; padding: 0; max-width: 100%; }
      .report-page { box-shadow: none; border-radius: 0; padding: 0; margin: 0; }
      .report-page::before { display: none; }
      .siksik-container { max-width: 100% !important; }

      /* ── Page-break rules ── */
      /* Never break immediately after a section header or bold category row */
      .section-header   { break-after: avoid; page-break-after: avoid; }
      .bold-row         { break-after: avoid; page-break-after: avoid; }
      /* Never orphan a sub-row from its parent category */
      .fs-table tr      { break-inside: avoid; page-break-inside: avoid; }
      /* Keep signature block together on one page */
      .sig-section      { break-inside: avoid; page-break-inside: avoid;
                          break-before: auto; page-break-before: auto; }
      .rpt-footer       { break-inside: avoid; page-break-inside: avoid; }

      /* ── Font scaling per paper size ── */
      /* Long bond — default, comfortable */
      body:not(.paper-letter) .fs-table       { font-size: 12.5px; }
      body:not(.paper-letter) .fs-table td    { padding: 2.5px 4px; }
      /* Letter — slightly tighter to fit more per page */
      body.paper-letter .fs-table             { font-size: 11.5px; }
      body.paper-letter .fs-table td          { padding: 1.5px 4px; }
      body.paper-letter .spacer-row td        { padding: 3px 0 !important; }
      body.paper-letter .section-header td    { padding-top: 10px !important; }
      /* A4 — similar to letter, slightly adjusted */
      body.paper-a4 .fs-table                 { font-size: 11.5px; }
      body.paper-a4 .fs-table td              { padding: 2px 4px; }
      body.paper-a4 .spacer-row td            { padding: 3px 0 !important; }
      body.paper-a4 .section-header td        { padding-top: 11px !important; }
    }
  </style>
</head>
<body>
<div class="topbar no-print">
  <div class="brand">
    <img src="umc-logo.png" alt="UMC Logo" onerror="this.style.display='none'">
    <div>
      <div class="brand-text">GraceBooks</div>
      <div class="brand-sub">TUMC Finance System</div>
    </div>
  </div>
  <div class="top-actions">
    <button class="btn-action btn-excel" onclick="exportToExcel()">
      <i class="fas fa-file-excel"></i> Export Excel
    </button>
    <select id="paper-size-sel" onchange="setPaperSize(this.value)"
      style="padding:7px 10px; border:none; border-radius:6px; font-size:12px;
             font-weight:600; font-family:'Poppins',sans-serif; background:rgba(255,255,255,0.18);
             color:white; cursor:pointer; outline:none;">
      <option value="long" style="color:#333;">📄 Long Bond (8.5×13)</option>
      <option value="letter" style="color:#333;">📄 Letter (8.5×11)</option>
      <option value="a4" style="color:#333;">📄 A4 (8.27×11.7)</option>
    </select>
    <button class="btn-action btn-print" onclick="window.print()">
      <i class="fas fa-print"></i> Print
    </button>
    <button class="btn-action btn-fullscreen" onclick="openReportFullscreen()">
      <i class="fas fa-expand"></i> Full Screen
    </button>
    <button class="btn-action btn-back" onclick="window.location.href='index.html'">
      <i class="fas fa-arrow-left"></i> Dashboard
    </button>
  </div>
</div>

<div class="controls-bar no-print">
  <div class="report-type-tabs">
    <button class="rtype-btn active" onclick="setReportType('monthly', this)">📋 Monthly Report</button>
    <button class="rtype-btn" onclick="setReportType('annual', this)">📊 Annual Report</button>
  </div>
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
  <div>
    <label>Sort Members By</label><br>
    <select id="sel-member-sort" onchange="render()">
      <option value="surname">Surname (A-Z)</option>
      <option value="name">First Name (A-Z)</option>
      <option value="id">Member ID</option>
      <option value="amount-desc">Amount (High to Low)</option>
      <option value="amount-asc">Amount (Low to High)</option>
    </select>
  </div>
</div>

  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <div>
      <label>Year</label><br>
      <select id="sel-year" onchange="render()"></select>
    </div>
    <div id="month-control">
      <label>Month</label><br>
      <select id="sel-month" onchange="render()">
        <option value="0">January</option><option value="1">February</option>
        <option value="2">March</option><option value="3">April</option>
        <option value="4">May</option><option value="5">June</option>
        <option value="6">July</option><option value="7">August</option>
        <option value="8">September</option><option value="9">October</option>
        <option value="10">November</option><option value="11">December</option>
      </select>
    </div>
  </div>

  <div style="margin-left: auto;">
    <button class="rtype-btn" onclick="document.getElementById('sig-modal').style.display='flex'">
      <i class="fas fa-pen-nib"></i> Set Signatories
    </button>
  </div>
</div>

<div id="sig-modal" class="modal no-print">
  <div class="modal-content">
    <div class="modal-header">Edit Signatories</div>
    
    <div class="sig-header-label">Chairperson</div>
    <div class="sig-grid">
      <div>
        <label>Label</label>
        <input type="text" id="sig-chairperson-label" placeholder="Approved by">
      </div>
      <div>
        <label>Name</label>
        <input type="text" id="sig-chairperson-name" placeholder="Chairperson Name">
      </div>
      <div>
        <label>Title</label>
        <input type="text" id="sig-chairperson-title" placeholder="Church Council Chairperson">
      </div>
    </div>

    <div class="sig-header-label">Finance Chair</div>
    <div class="sig-grid">
      <div>
        <label>Label</label>
        <input type="text" id="sig-finance-chair-label" placeholder="Approved by">
      </div>
      <div>
        <label>Name</label>
        <input type="text" id="sig-finance-chair-name" placeholder="Finance Chair Name">
      </div>
      <div>
        <label>Title</label>
        <input type="text" id="sig-finance-chair-title" placeholder="Finance Chair">
      </div>
    </div>

    <div class="sig-header-label">Treasurer</div>
    <div class="sig-grid">
      <div>
        <label>Label</label>
        <input type="text" id="sig-treasurer-label" placeholder="Prepared by">
      </div>
      <div>
        <label>Name</label>
        <input type="text" id="sig-treasurer-name" placeholder="Juan Dela Cruz">
      </div>
      <div>
        <label>Title</label>
        <input type="text" id="sig-treasurer-title" placeholder="Church Treasurer">
      </div>
    </div>

    <div class="sig-header-label">Auditor</div>
    <div class="sig-grid">
      <div>
        <label>Label</label>
        <input type="text" id="sig-auditor-label" placeholder="Audited by">
      </div>
      <div>
        <label>Name</label>
        <input type="text" id="sig-auditor-name" placeholder="Maria Clara">
      </div>
      <div>
        <label>Title</label>
        <input type="text" id="sig-auditor-title" placeholder="Church Auditor">
      </div>
    </div>

    <div class="sig-header-label">Pastor</div>
    <div class="sig-grid">
      <div>
        <label>Label</label>
        <input type="text" id="sig-pastor-label" placeholder="Noted by">
      </div>
      <div>
        <label>Name</label>
        <input type="text" id="sig-pastor-name" placeholder="Rev. Juan">
      </div>
      <div>
        <label>Title</label>
        <input type="text" id="sig-pastor-title" placeholder="Church Pastor">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="document.getElementById('sig-modal').style.display='none'">Cancel</button>
      <button class="btn-save" onclick="saveSignatories()">Save Settings</button>
    </div>
  </div>
</div>

<div class="fullscreen-toolbar no-print" id="fullscreen-toolbar">
  <button class="fs-tool-btn" onclick="changeReportZoom(-0.1)" title="Zoom out">
    <i class="fas fa-minus"></i>
  </button>
  <span class="fs-zoom-label" id="report-zoom-label">100%</span>
  <button class="fs-tool-btn" onclick="changeReportZoom(0.1)" title="Zoom in">
    <i class="fas fa-plus"></i>
  </button>
  <button class="fs-tool-btn" onclick="resetReportZoom()" title="Reset zoom">
    <i class="fas fa-rotate-left"></i>
  </button>
  <button class="fs-tool-btn" onclick="closeReportFullscreen()" title="Close full screen">
    <i class="fas fa-xmark"></i>
  </button>
</div>

<div class="report-wrapper">
  <div class="report-page" id="report-page">
    <div style="text-align:center; padding:60px; color:#aaa;">
      <i class="fas fa-spinner fa-spin" style="font-size:32px;"></i>
      <div style="margin-top:12px; font-size:14px;">Loading data from cloud...</div>
    </div>
  </div>
</div>

<script>
  // ── FIREBASE CONFIGURATION ────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyCimlS-2_tInj_khQ6KIaeocHYVVK0hwtc",
    authDomain: "gracebooks-7eebc.firebaseapp.com",
    projectId: "gracebooks-7eebc",

  let incomeData   = [];

  const FINANCIAL_ACCOUNTS = [

    { id:'petty-cash', name:'Petty Cash Fund' },
    { id:'building',   name:'Building Fund' },
    { id:'mission',    name:'Mission Fund' },
    { id:'investment', name:'Investments/TD' }
  ];
  
  // Default Signatories Variables (Nakalagay na ang Label, Name, at Title)
  let signatories = {
    chairpersonLabel: "Approved by",
    chairpersonName: "",
    chairpersonTitle: "Church Council Chairperson",

    financeChairLabel: "Approved by",
    financeChairName: "",
    financeChairTitle: "Finance Chair",

    treasurerLabel: "Prepared by",
    treasurerName: "",
    treasurerTitle: "Church Treasurer",

    auditorLabel: "Audited by",
    auditorName: "",
    auditorTitle: "Church Auditor",

    pastorLabel: "Noted by",

  function syncSignatoryInputs() {
    document.getElementById('sig-chairperson-label').value = signatories.chairpersonLabel;
    document.getElementById('sig-chairperson-name').value = signatories.chairpersonName;
    document.getElementById('sig-chairperson-title').value = signatories.chairpersonTitle;

    document.getElementById('sig-finance-chair-label').value = signatories.financeChairLabel;
    document.getElementById('sig-finance-chair-name').value = signatories.financeChairName;
    document.getElementById('sig-finance-chair-title').value = signatories.financeChairTitle;

    document.getElementById('sig-treasurer-label').value = signatories.treasurerLabel;

  function fmt(num) {
    return Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatCategoryName(str) {
    if (!str) return '';
    str = String(str).trim();
    if (!str) return '';
    // Preserve words that are all-uppercase (acronyms like SSS, HDMF, BIR, VAT, etc.)
    return str.split(' ').map(word => {
      if (!word) return word;
      // If the word (ignoring slashes and digits) is all uppercase letters, preserve it
      const letters = word.replace(/[^a-zA-Z]/g, '');
      if (letters.length > 0 && letters === letters.toUpperCase()) return word;
      return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
    }).join(' ');
  }

  function getMemberId(d) {
    return (d.memberId || d.memberID || d.memberCode || '').toString().trim();
  }

  function resolveMemberName(d) {
    const memberId = getMemberId(d);
    if (memberId && memberNameById[memberId]) return memberNameById[memberId];
    const rawName = (d.member || d.name || d.Member || '').trim();
    const legacyName = memberNameByLegacyKey[normalizeMemberLookupName(rawName)];
    if (legacyName && legacyName !== '__AMBIGUOUS__') return legacyName;
    return rawName || 'General Collection';
  }

  function formatMemberName(d) {
    const last = d.last || d.lastName || '';
    const first = d.first || d.firstName || '';
    return `${last}, ${first}`.replace(/^,\s*|\s*,\s*$/g, '').trim();
  }

  function normalizeMemberLookupName(value) {
    return String(value || '')
      .toLowerCase()
      .replace(/[^a-z0-9\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function addMemberNameAlias(rawName, currentName) {
    const key = normalizeMemberLookupName(rawName);
    if (!key || !currentName) return;
    if (memberNameByLegacyKey[key] && memberNameByLegacyKey[key] !== currentName) {
      memberNameByLegacyKey[key] = '__AMBIGUOUS__';
      return;
    }
    memberNameByLegacyKey[key] = currentName;
  }

  function addMemberNameAliases(d, currentName) {
    const last = (d.last || d.lastName || '').toString().trim();
    const first = (d.first || d.firstName || '').toString().trim();
    const firstToken = first.split(/\s+/).filter(Boolean)[0] || '';

    addMemberNameAlias(currentName, currentName);
    addMemberNameAlias(`${last}, ${first}`, currentName);
    addMemberNameAlias(`${first} ${last}`, currentName);
    addMemberNameAlias(`${last} ${first}`, currentName);
    if (firstToken && firstToken !== first) {
      addMemberNameAlias(`${firstToken} ${last}`, currentName);
      addMemberNameAlias(`${last}, ${firstToken}`, currentName);
      addMemberNameAlias(`${last} ${firstToken}`, currentName);
    }
  }

  function workflowSignatureHtml(key, fallbackName, fallbackTitle) {
    const sig = workflowSignatures[key] || {};
    const name = fallbackName || sig.name || '';
    const image = sig.signedAt && sig.mode === 'electronic' && sig.signatureUrl
      ? `<div class="workflow-sig-space"><img class="workflow-sig-img" src="${escapeAttr(sig.signatureUrl)}" alt="Signature" onerror="this.parentElement.innerHTML='<span class=&quot;workflow-sig-unavailable&quot;>Signature image unavailable</span>';"></div>`
      : '';
    const manual = sig.signedAt && sig.mode === 'manual'
      ? '<div class="workflow-sig-space"><span class="workflow-sig-manual">Manual signature</span></div>'
      : '<div class="workflow-sig-space"></div>';
    return `
      ${image || manual}
      <div class="workflow-sig-line"></div>
      <div style="font-weight:700; font-size:12px;">${escapeHtml(name)}</div>
      <div style="font-size:11px; color:var(--gray);">${escapeHtml(fallbackTitle || '')}</div>
    `;
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[char]));
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#96;');
  }

  function getObligationPaidAmount(o) {
    if (o.paidAmount !== undefined) return Math.max(0, parseFloat(o.paidAmount) || 0);
    return o.status === 'Paid' ? (parseFloat(o.amount) || 0) : 0;
  }

  function getObligationBalance(o) {
    const amount = Math.max(0, parseFloat(o.amount) || 0);
    return Math.max(0, amount - getObligationPaidAmount(o));
  }

  function getObligationStatus(o) {
    const amount = Math.max(0, parseFloat(o.amount) || 0);
    const paidAmount = Math.min(amount, getObligationPaidAmount(o));
    if (amount > 0 && paidAmount >= amount) return 'Paid';
    if (paidAmount > 0) return 'Partially Paid';
    return 'Unpaid';
  }

  // ── CORE REPORT GENERATION ───────────────────────────────────────────────
  function generateReportHTML(year, month, isAnnual) {
    const fInc = incomeData.filter(d => {
      if(!d.date) return false;
      const dt = new Date(d.date);
      return isAnnual ? dt.getFullYear() === year : (dt.getFullYear()===year && dt.getMonth()===month);
    });
    
    const fExp = expenseData.filter(d => {
      if(!d.date) return false;
      const dt = new Date(d.date);
      return isAnnual ? dt.getFullYear() === year : (dt.getFullYear()===year && dt.getMonth()===month);
    });

    let begBal = systemInitialBalance; 
    let memberSort = 'surname'; // Default sort
    const targetDate = isAnnual ? new Date(year, 0, 1) : new Date(year, month, 1);
    
    incomeData.forEach(d => {
      if (d.date && new Date(d.date) < targetDate) begBal += parseFloat(d.amount||0);
    });
    expenseData.forEach(d => {
      if (d.date && new Date(d.date) < targetDate) begBal -= parseFloat(d.amount||0);
    });

    const totalIn  = fInc.reduce((s,d) => s + parseFloat(d.amount||0), 0);
    const totalOut = fExp.reduce((s,d) => s + parseFloat(d.amount||0), 0);
    const endBal   = begBal + totalIn - totalOut;
    const periodEndDate = isAnnual ? new Date(year, 11, 31, 23, 59, 59) : new Date(year, month + 1, 0, 23, 59, 59);
    const netChange = totalIn - totalOut;
    const accountBalances = getAccountBalancesThrough(periodEndDate);
    const accountRows = FINANCIAL_ACCOUNTS.map(a => {
      const balance = accountBalances[a.id] || 0;
      return `
        <tr>
          <td class="col-desc indent-1">${a.name}</td>
          <td class="col-sub"></td>
          <td class="col-main ${balance < 0 ? 'amount-negative' : ''}">₱ ${fmt(balance)}</td>
        </tr>`;
    }).join('');
    const periodObligations = obligationsData.filter(o => {
      if (getObligationBalance(o) <= 0) return false;
      if (!o.dueDate) return true;
      const dt = new Date(o.dueDate);
      return !isNaN(dt.getTime()) && dt.getFullYear() === year;
    }).sort((a, b) => String(a.dueDate || '').localeCompare(String(b.dueDate || '')));
    const obligationRows = periodObligations.map(o => {
      const amount = Math.max(0, parseFloat(o.amount || 0));
      const paidAmount = getObligationPaidAmount(o);
      const balanceAmount = getObligationBalance(o);
      const status = getObligationStatus(o);
      const settlementText = paidAmount > 0 ? ` · settled ₱ ${fmt(paidAmount)} of ₱ ${fmt(amount)}` : '';
      return `
      <tr>
        <td class="col-desc indent-1">${o.name || 'Church Obligation'} <span style="color:#777;font-size:11px;">${status}${o.dueDate ? ' · ' + o.dueDate : ''}${settlementText}</span></td>
        <td class="col-sub"></td>
        <td class="col-main">₱ ${fmt(balanceAmount)}</td>
      </tr>`;
    }).join('');

    // expOrderMain / expOrderSub use the EXACT original strings from accountOrder.expense
    // so the report order always matches the budget setup exactly, with no formatting drift.
    let expOrderMain = [];   // e.g. ["Administrative Pastor", "Deaconess", ...]
    let expOrderSub  = {};   // e.g. { "Administrative Pastor": ["SSS","HDMF/Pagibig",...] }
    // catKeyToMain: maps the raw category key stored in d.category -> canonical main name
    // catKeyToSub:  maps the raw category key -> canonical sub name
    const catKeyToMain = {};
    const catKeyToSub  = {};
    const expAllKeys = accountOrder.expense || [];
    // Helper: resolve correct main group for a key given all sibling keys
    function resolveMainGroup(k, allKeys) {
      if (!k.includes(' - ')) return k;
      const parts = k.split(' - ');
      // Try longest prefix first
      for (let i = parts.length - 1; i >= 1; i--) {
        const prefix = parts.slice(0, i).join(' - ');
        const prefixDash = prefix + ' - ';
        if (allKeys.some(other => other !== k && other.startsWith(prefixDash))) return prefix;
      }
      return parts[0];
    }
    expAllKeys.forEach(k => {
      let rawMain = resolveMainGroup(k, expAllKeys);
      let rawSub  = k.startsWith(rawMain + ' - ') ? k.slice(rawMain.length + 3).trim() : (k.includes(' - ') ? k.split(' - ').slice(1).join(' - ').trim() : '');
      // Use formatCategoryName only on the main group for consistent capitalisation of normal words;
      // preserve the sub exactly as typed in the budget setup (acronyms, slashes, etc.)
      let m = formatCategoryName(rawMain);
      let s = rawSub || k;  // standalone key (no dash) uses itself as sub label e.g. 'PCC BOP'
      if (!expOrderMain.includes(m)) expOrderMain.push(m);
      if (!expOrderSub[m]) expOrderSub[m] = [];
      if (!expOrderSub[m].includes(s)) expOrderSub[m].push(s);
      // Map the full original key -> main & sub so expense records resolve to the right bucket
      catKeyToMain[k] = m;
      catKeyToSub[k]  = s;
    });

    let incOrderMain = [];
    let incOrderSub = {};
    (accountOrder.income || []).forEach(k => {
      let parts = k.split(' - ');
      let m = formatCategoryName(parts[0].trim());
      let s = parts.length > 1 ? formatCategoryName(parts.slice(1).join(' - ').trim()) : 'Others';
      if (!incOrderMain.includes(m)) incOrderMain.push(m);
      if (!incOrderSub[m]) incOrderSub[m] = [];
      if (!incOrderSub[m].includes(s)) incOrderSub[m].push(s);
    });

    const incGroups = { 'Source of Funds': {t:0, s:{}}, 'Occasional Offering': {t:0, s:{}}, 'Miscellaneous': {t:0, s:{}} };
    
    fInc.forEach(d => {
      let mainType = (d.type || '').trim();
      let budgetCat = (d.budgetCategory || d.category || '').trim();
      let details = (d.budgetDetails || d.notes || '').trim();
      
      let subLow = budgetCat.toLowerCase();
      let mainLow = mainType.toLowerCase();
      let checkMain = formatCategoryName(mainType);
      
      let finalMain = '';
      let sub = '';

      let isKnown = false;
      if (incOrderMain.length === 0) {
          isKnown = true; 
      } else if (incOrderMain.includes(checkMain)) {
          isKnown = true;
      }
      
      if (mainType === 'Source of Funds' || subLow.includes('tithe') || subLow.includes('loose') || subLow.includes('sunday school') || mainType === 'Occasional Offering') {
          isKnown = true;
      }

      if (subLow.includes('not in') || mainLow.includes('not in') || !isKnown) {
        finalMain = 'Miscellaneous';
        
        let candidates = [details, budgetCat, mainType];
        let subName = 'Other Unbudgeted Income';
        
        for (let cand of candidates) {
           if (!cand) continue;
           let cleaned = cand.replace(/not in( the)? budget/ig, '').replace(/^[\s\-\:\/]+|[\s\-\:\/]+$/g, '').trim();
           if (cleaned && cleaned.toLowerCase() !== 'others' && cleaned.toLowerCase() !== 'miscellaneous') {
               subName = formatCategoryName(cleaned);
               break; 
           }
        }
        sub = subName;
        
      } else {
        if (mainType === 'Source of Funds' || subLow.includes('tithe') || subLow.includes('loose') || subLow.includes('sunday school')) {
          finalMain = 'Source of Funds';
          if (subLow.includes('tithe')) sub = 'Tithes';
          else if (subLow.includes('loose') || subLow === 'offering') sub = 'Loose Offering';
          else if (subLow.includes('sunday school')) sub = 'Sunday School';
          else sub = formatCategoryName(budgetCat);
        }
        else if (mainType === 'Occasional Offering') {
          finalMain = 'Occasional Offering';
          let cleanedSub = budgetCat;
          if (cleanedSub.toLowerCase().startsWith('occasional offering')) {
              cleanedSub = cleanedSub.replace(/occasional offering/i, '').replace(/^[\s\-]+/, '').trim();
          }
          if (!cleanedSub) cleanedSub = 'General';
          sub = formatCategoryName(cleanedSub) || 'Others';
        } else {
          finalMain = checkMain;
          sub = formatCategoryName(budgetCat) || 'Others';
        }
      }

      if (finalMain !== 'Miscellaneous' && (finalMain.toLowerCase() === 'miscellaneous' || finalMain.toLowerCase() === 'others')) {
          finalMain = 'Miscellaneous';
          sub = details ? formatCategoryName(details) : formatCategoryName(budgetCat || 'Other Unbudgeted Income');
      }

      if (!incGroups[finalMain]) incGroups[finalMain] = {t:0, s:{}};
  if (!incGroups[finalMain].s[sub]) {
      incGroups[finalMain].s[sub] = {t:0, m:{}, ids:{}}; // Added ids object here
  }
  
  let amt = parseFloat(d.amount || 0);
  let member = resolveMemberName(d);
  let mId = getMemberId(d); // Capture Member ID from database
  
  incGroups[finalMain].s[sub].t += amt;
  
  if (member.toLowerCase() !== 'general collection') {
    incGroups[finalMain].s[sub].m[member] = (incGroups[finalMain].s[sub].m[member] || 0) + amt;
    if (mId) incGroups[finalMain].s[sub].ids[member] = mId; // Map name to ID
  }
  incGroups[finalMain].t += amt;
});

    let incRows = '';
    const sortedIncMainKeys = Object.keys(incGroups).sort((a, b) => {
       if (a === 'Miscellaneous') return 1;
       if (b === 'Miscellaneous') return -1;
       const order = ['Source of Funds', 'Occasional Offering'];
       let idxA = order.indexOf(a);
       let idxB = order.indexOf(b);
       if (idxA !== -1 && idxB !== -1) return idxA - idxB;
       if (idxA !== -1) return -1;
       if (idxB !== -1) return 1;
       return a.localeCompare(b);
    });

    sortedIncMainKeys.forEach(main => {
      const g = incGroups[main];

      incRows += `
        <tr>
          <td class="col-desc indent-1" style="font-weight:bold;">${main}</td>

      const sortedIncomeSubKeys = Object.keys(g.s).sort((a, b) => {
        const al = a.toLowerCase(), bl = b.toLowerCase();

        if (!al.includes('tithe') && bl.includes('tithe')) return 1;
        return a.localeCompare(b);
      });

      sortedIncomeSubKeys.forEach(sub => {
        incRows += `

  const KNOWN_ACCOUNT_IDS = new Set(FINANCIAL_ACCOUNTS.map(account => account.id));

  function normalizeAccountId(value) {
    const raw = String(value || '').trim();
    return KNOWN_ACCOUNT_IDS.has(raw) ? raw : '';
  }

  function getIncomeAccountId(d) {
    const explicitAccount = normalizeAccountId(d.targetAccId) || normalizeAccountId(d.targetAccount);
    if (explicitAccount) return explicitAccount;
    if (d.type === 'Building Fund') return 'building';
    if (d.type === 'Mission Fund') return 'mission';
    if (d.type === 'Investment Income') return 'investment';
    return d.payment === 'Bank Transfer' ? 'cash-bank' : 'cash-hand';
  }

  function getExpenseAccountId(d) {
    const explicitAccount = normalizeAccountId(d.targetAccId) || normalizeAccountId(d.targetAccount);
    if (explicitAccount) return explicitAccount;
    if (d.payment === 'Bank Transfer') return 'cash-bank';
    if (d.payment === 'Petty Cash') return 'petty-cash';
    return 'cash-hand';
  }

  function getAccountBalancesThrough(endDate) {
    const balances = {};
    FINANCIAL_ACCOUNTS.forEach(a => balances[a.id] = parseFloat(beginningAccounts[a.id] || 0));

    allIncomeData.forEach(d => {
      if (!d.date || new Date(d.date) > endDate) return;
      const id = getIncomeAccountId(d);
      if (balances[id] === undefined) balances[id] = 0;
      balances[id] += parseFloat(d.amount || 0);
    });

    allExpenseData.forEach(d => {
      if (!d.date || new Date(d.date) > endDate) return;
      const id = getExpenseAccountId(d);
      if (balances[id] === undefined) balances[id] = 0;
      balances[id] -= parseFloat(d.amount || 0);
    });

    return balances;
  }

  // ── EXPORT FUNCTIONALITY ──────────────────────────────────────────────────
  function exportToExcel() {
    const year  = parseInt(document.getElementById('sel-year').value);
    const month = parseInt(document.getElementById('sel-month').value);
    const isAnnual = reportType === 'annual';
    const periodText = isAnnual
      ? `For the Year ${year}`
      : `For the Month of ${MONTHS[month]} ${year}`;
    const filename = isAnnual
      ? `Financial_Report_${year}.xlsx`
      : `Financial_Report_${MONTHS[month]}_${year}.xlsx`;

    // ── Helpers ──────────────────────────────────────────────────────────────
    const wb = XLSX.utils.book_new();
    const ws = {};
    let R = 0; // current row (0-indexed)

    // Cell address helper
    const addr = (r, c) => XLSX.utils.encode_cell({ r, c });

    // Write a cell with optional style
    function cell(r, c, v, s) {
      const a = addr(r, c);
      ws[a] = { v, t: typeof v === 'number' ? 'n' : 's', s: s || {} };
    }

    // Merge helper — pushes to ws['!merges']
    if (!ws['!merges']) ws['!merges'] = [];
    function merge(r1, c1, r2, c2) {
      ws['!merges'].push({ s: { r: r1, c: c1 }, e: { r: r2, c: c2 } });
    }

    // ── Shared style objects ─────────────────────────────────────────────────
    const RED   = 'FF8B0000';
    const GOLD  = 'FFC9A84C';
    const DARK  = 'FF1A1A1A';
    const GRAY  = 'FF555555';
    const WHITE = 'FFFFFFFF';
    const LGRAY = 'FFF5F5F5';

    const fontBase   = { name: 'Calibri', sz: 10 };
    const fontBold   = { ...fontBase, bold: true };
    const fontHeader = { name: 'Calibri', sz: 13, bold: true, color: { rgb: WHITE } };
    const fontSub    = { name: 'Calibri', sz: 10, color: { rgb: GRAY } };
    const fontTitle  = { name: 'Calibri', sz: 14, bold: true };
    const fontChurch = { name: 'Calibri', sz: 16, bold: true, color: { rgb: RED } };
    const fontSection = { name: 'Calibri', sz: 10, bold: true, color: { rgb: WHITE } };
    const fontIndent1 = { name: 'Calibri', sz: 10, bold: true };
    const fontIndent2 = { name: 'Calibri', sz: 9.5, color: { rgb: '44333333' } };
    const fontTotal  = { name: 'Calibri', sz: 11, bold: true };

    const alignR  = { horizontal: 'right', vertical: 'center' };
    const alignC  = { horizontal: 'center', vertical: 'center' };
    const alignL  = { horizontal: 'left',  vertical: 'center' };

    const borderThin = { style: 'thin', color: { rgb: 'FFCCCCCC' } };
    const borderMed  = { style: 'medium', color: { rgb: DARK } };
    const borderDbl  = { style: 'double', color: { rgb: DARK } };
    const borderRed  = { style: 'medium', color: { rgb: RED } };

    const numFmt = '₱ #,##0.00';

    // Style factories
    function sAmount(extra = {}) {
      return { font: { ...fontBase, ...extra.font }, alignment: alignR,
               numFmt, border: extra.border || {} };
    }
    function sAmountBold(extra = {}) {
      return { font: { ...fontBold, ...extra.font }, alignment: alignR,
               numFmt, border: extra.border || {} };
    }

    // ── HEADER ROWS ──────────────────────────────────────────────────────────
    // Row 0: Church name (merged A-C)
    merge(R, 0, R, 2);
    cell(R, 0, 'Tagaytay United Methodist Church', {
      font: fontChurch, alignment: alignC
    });
    R++;

    // Row 1: Address
    merge(R, 0, R, 2);
    cell(R, 0, 'Maglabe Drive, Asisan, Tagaytay City', {
      font: fontSub, alignment: alignC
    });
    R++;

    // Row 2: Report title
    merge(R, 0, R, 2);
    cell(R, 0, 'Statement of Receipts and Disbursements', {
      font: fontTitle, alignment: alignC
    });
    R++;

    // Row 3: Period
    merge(R, 0, R, 2);
    cell(R, 0, periodText, {
      font: { ...fontBase, italic: true }, alignment: alignC
    });
    R++;

    // Spacer
    R++;

    // ── Reads data from the already-rendered report HTML ──────────────────────
    // We pull the live data from the DOM's rendered report table rows.
    // This is the most reliable source since generateReportHTML already processed everything.
    const reportTable = document.getElementById('export-table');
    if (!reportTable) { alert('No report data to export.'); return; }

    const rows = reportTable.querySelectorAll('tr');

    rows.forEach(tr => {
      const tds = tr.querySelectorAll('td');
      if (!tds.length) return;

      const cls = tr.className || '';
      const tdCls0 = tds[0] ? (tds[0].className || '') : '';
      const text0  = tds[0] ? tds[0].innerText.trim() : '';
      const text1  = tds[1] ? tds[1].innerText.trim() : '';
      const text2  = tds[2] ? tds[2].innerText.trim() : '';

      // Helper: parse peso text to number
      const parsePeso = t => parseFloat((t || '').replace(/[₱,\s]/g, '')) || null;

      // ── Section header (Receipts / Disbursements) ──
      if (cls.includes('section-header')) {
        merge(R, 0, R, 2);
        cell(R, 0, text0.replace(/\n/g, ' '), {
          font: fontSection,
          fill: { patternType: 'solid', fgColor: { rgb: RED } },
          alignment: { ...alignL, indent: 1 },
          border: { bottom: borderRed }
        });
        R++; return;
      }

      // ── Spacer row ──
      if (cls.includes('spacer-row')) { R++; return; }

      // ── Total row (Ending Balance) ──
      if (cls.includes('total-row')) {
        const amt = parsePeso(text2);
        cell(R, 0, text0, {
          font: fontTotal, alignment: alignL,
          border: { top: borderMed, bottom: borderDbl }
        });
        cell(R, 1, text1 || '', { alignment: alignC });
        if (amt !== null) {
          cell(R, 2, amt, {
            font: fontTotal, alignment: alignR, numFmt,
            border: { top: borderMed, bottom: borderDbl }
          });
        }
        R++; return;
      }

      // ── Subtotal row ──
      if (cls.includes('subtotal-row')) {
        const amt = parsePeso(text2);
        cell(R, 0, text0, {
          font: fontBold, alignment: alignL,
          border: { top: borderThin }
        });
        cell(R, 1, text1 || '', { alignment: alignC });
        if (amt !== null) {
          cell(R, 2, amt, sAmountBold({ border: { top: borderThin } }));
        }
        R++; return;
      }

      // ── Bold row (Beginning Balance, Total Cash Available) ──
      if (cls.includes('bold-row')) {
        const amt = parsePeso(text2);
        cell(R, 0, text0, { font: fontBold, alignment: alignL });
        cell(R, 1, text1 || '', { alignment: alignC });
        if (amt !== null) {
          cell(R, 2, amt, sAmountBold());
        }
        R++; return;
      }

      // ── Category (indent-1, bold) ──
      if (tdCls0.includes('indent-1')) {
        const amt = parsePeso(text2);
        cell(R, 0, '  ' + text0, {
          font: fontIndent1, alignment: alignL,
          fill: { patternType: 'solid', fgColor: { rgb: 'FFF9F2F2' } }
        });
        cell(R, 1, '', {
          fill: { patternType: 'solid', fgColor: { rgb: 'FFF9F2F2' } }
        });
        if (amt !== null) {
          cell(R, 2, amt, {
            font: fontIndent1, alignment: alignR, numFmt,
            fill: { patternType: 'solid', fgColor: { rgb: 'FFF9F2F2' } }
          });
        }
        R++; return;

      // ── Sub-category (indent-2) ──
      if (tdCls0.includes('indent-2')) {
        const subAmt = parsePeso(text1);
        cell(R, 0, '      ' + text0, { font: fontIndent2, alignment: alignL });
        if (subAmt !== null) {
          cell(R, 1, subAmt, { font: fontIndent2, alignment: alignR, numFmt });
        }
        cell(R, 2, '', {});
        R++; return;
      }

      // ── Sub-sub rows (member breakdown, small indent) ──
      if (tds.length >= 2 && text0.startsWith('-')) {
        const amt = parsePeso(text1);
        cell(R, 0, '          ' + text0, {
          font: { ...fontBase, sz: 9, color: { rgb: GRAY } }, alignment: alignL
        });
        if (amt !== null) {
          cell(R, 1, amt, {
            font: { ...fontBase, sz: 9, color: { rgb: GRAY } }, alignment: alignR, numFmt
          });
        }
        cell(R, 2, '', {});
        R++; return;
      }
    });

    // Spacer before signatures
    R += 2;

    // ── SIGNATURE BLOCK ──────────────────────────────────────────────────────
    // 5 columns: Chairperson | Finance Chair | Treasurer | Auditor | Pastor
    // Label row
    cell(R, 0, signatories.chairpersonLabel || 'Approved by', { font: fontBase, alignment: alignC });
    cell(R, 1, signatories.financeChairLabel || 'Approved by', { font: fontBase, alignment: alignC });
    cell(R, 2, signatories.treasurerLabel || 'Prepared by', { font: fontBase, alignment: alignC });
    cell(R, 3, signatories.auditorLabel || 'Audited by', { font: fontBase, alignment: alignC });
    cell(R, 4, signatories.pastorLabel || 'Noted by', { font: fontBase, alignment: alignC });
    R += 3; // space for signature

    // Signature line + name
    const sigLine = { top: { style: 'thin', color: { rgb: DARK } } };
    cell(R, 0, signatories.chairpersonName || '', { font: fontBold, alignment: alignC, border: sigLine });
    cell(R, 1, signatories.financeChairName || '', { font: fontBold, alignment: alignC, border: sigLine });
    cell(R, 2, signatories.treasurerName || '', { font: fontBold, alignment: alignC, border: sigLine });
    cell(R, 3, signatories.auditorName || '', { font: fontBold, alignment: alignC, border: sigLine });
    cell(R, 4, signatories.pastorName || '', { font: fontBold, alignment: alignC, border: sigLine });
    R++;

    // Title
    cell(R, 0, signatories.chairpersonTitle || 'Church Council Chairperson', { font: fontSub, alignment: alignC });
    cell(R, 1, signatories.financeChairTitle || 'Finance Chair', { font: fontSub, alignment: alignC });
    cell(R, 2, signatories.treasurerTitle || 'Church Treasurer', { font: fontSub, alignment: alignC });
    cell(R, 3, signatories.auditorTitle || 'Church Auditor', { font: fontSub, alignment: alignC });
    cell(R, 4, signatories.pastorTitle || 'Church Pastor', { font: fontSub, alignment: alignC });
    R++;

    // ── Footer ──────────────────────────────────────────────────────────────
    R++;
    merge(R, 0, R, 4);
    cell(R, 0, `GraceBooks — TUMC Finance System · ${MONTHS[month] || ''} ${year}`, {
      font: { ...fontBase, sz: 8.5, color: { rgb: 'FFAAAAAA' } }, alignment: alignC
    });

    // ── Sheet dimensions ─────────────────────────────────────────────────────
    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: R, c: 4 } });
    ws['!cols'] = [
      { wch: 42 }, // A: description (wide)
      { wch: 16 }, // B: sub amount
      { wch: 16 }, // C: main amount
      { wch: 16 },
      { wch: 16 },
    ];
    ws['!rows'] = [
      { hpt: 22 }, // church name
      { hpt: 14 }, // address
      { hpt: 18 }, // title
      { hpt: 13 }, // period
    ];

    XLSX.utils.book_append_sheet(wb, ws, 'Financial Report');
    XLSX.writeFile(wb, filename);
  }

  // ── Paper size switcher ─────────────────────────────────────────────────
  let _paperStyleEl = null;
  function setPaperSize(val) {
    if (!_paperStyleEl) {
      _paperStyleEl = document.createElement('style');
      _paperStyleEl.id = 'dynamic-page-size';
      document.head.appendChild(_paperStyleEl);
    }
    document.body.classList.remove('paper-letter', 'paper-a4');
    if (val === 'letter') {
      document.body.classList.add('paper-letter');
      _paperStyleEl.textContent = '@page { size: 8.5in 11in; margin: 0.5in 0.6in; }';
    } else if (val === 'a4') {
      document.body.classList.add('paper-a4');
      _paperStyleEl.textContent = '@page { size: 210mm 297mm; margin: 14mm 16mm; }';
    } else {
      _paperStyleEl.textContent = '@page { size: 8.5in 13in; margin: 0.6in 0.65in; }';
    }
  }
</script>
</body>
</html>
