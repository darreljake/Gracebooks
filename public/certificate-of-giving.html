<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#8B0000"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>GraceBooks — Certificate of Giving</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>
  <script src="auth.js"></script>
  <script>requireGraceBooksAuth();</script>
  <script src="qrcode.min.js"></script>

  <style>
    :root {
      --red:      #8B0000;
      --red-mid:  #c0392b;
      --red-light:#fdf2f2;
      --gold:     #c9a84c;
      --dark:     #1a1a1a;
      --gray:     #555;
      --line:     #ccc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f0f2f5; color: var(--dark); min-height: 100vh; }

    .topbar {
      background: var(--red); color: white; padding: 14px 28px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 3px 15px rgba(0,0,0,0.25); position: sticky; top: 0; z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand img { height: 46px; }
    .brand-text { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .brand-sub  { font-size: 11px; opacity: 0.75; letter-spacing: 0.5px; }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-action {
      padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
      display: flex; align-items: center; gap: 6px; color: white; transition: 0.2s; font-family: 'Poppins', sans-serif;
    }
    .btn-action:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-back  { background: rgba(255,255,255,0.15); }
    .btn-print { background: #1a5276; }
    .btn-generate { background: #1e8449; }

    .controls-bar {
      background: white; padding: 18px 28px; display: flex; flex-direction: column; gap: 14px;
      border-bottom: 1px solid #e0e0e0; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .controls-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
    .field-group { display: flex; flex-direction: column; gap: 4px; position: relative; }
    .field-group label { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.4px; }
    .field-group input, .field-group select {
      padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px;
      background: white; font-family: 'Poppins', sans-serif; min-width: 200px;
    }
    .field-group input:focus, .field-group select:focus { outline: none; border-color: var(--red); }

    .toggle-group { display: flex; border: 1px solid #ddd; border-radius: 20px; overflow: hidden; }
    .toggle-btn {
      padding: 8px 16px; border: none; background: white; font-size: 12px; font-weight: 600;
      cursor: pointer; color: var(--gray); font-family: 'Poppins', sans-serif; transition: 0.2s;
    }
    .toggle-btn.active { background: var(--red); color: white; }

    #member-suggestions {
      display: none; position: absolute; top: 100%; left: 0; right: 0; background: white;
      border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      z-index: 50; max-height: 220px; overflow-y: auto; margin-top: 2px;
    }
    .member-suggestion-item { padding: 9px 12px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; }
    .member-suggestion-item:hover { background: var(--red-light); }
    .ms-code { color: var(--gray); font-size: 11px; }

    .warn-banner {
      background: #fff8e1; border: 1px solid #f1c40f; color: #7a5c00; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; display: none;
    }
    .warn-banner.show { display: block; }

    .cert-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
    .cert-list-item {
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      padding: 10px 12px; border: 1px solid #eee; border-radius: 8px; font-size: 12.5px;
    }
    .cert-list-item .meta { color: var(--gray); font-size: 11px; }
    .btn-small { padding: 6px 12px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-view { background: #1a5276; color: white; }
    .btn-sign { background: #1e8449; color: white; }
    .btn-small:disabled { opacity: 0.5; cursor: not-allowed; }

    .report-wrapper { max-width: 860px; margin: 28px auto; padding: 0 20px 60px; }
    .report-page {
      background: white; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 48px 56px; position: relative;
    }
    .report-page::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
      background: linear-gradient(to bottom, var(--red), var(--red-mid));
    }

    .rpt-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 2px solid var(--red); }
    .rpt-header img { height: 70px; }
    .rpt-header-text { flex: 1; text-align: center; }
    .rpt-church-name { font-family: 'EB Garamond', serif; font-size: 20px; font-weight: 700; color: var(--red); }
    .rpt-church-address { font-size: 11px; color: var(--gray); margin-top: 2px; }
    .rpt-title { font-size: 15px; font-weight: 700; color: var(--dark); text-transform: uppercase; margin-top: 10px; letter-spacing: 1px; }
    .rpt-period { font-size: 12px; color: var(--gray); margin-top: 2px; }

    .cert-block { text-align: center; padding: 10px 10px 30px; position: relative; }
    .cert-frame { border: 2px solid var(--gold); border-radius: 6px; padding: 30px 40px; position: relative; }
    .cert-eyebrow { font-family: 'EB Garamond', serif; font-size: 13px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
    .cert-headline { font-family: 'EB Garamond', serif; font-size: 26px; font-weight: 700; color: var(--red); margin-bottom: 18px; }
    .cert-body { font-size: 13.5px; line-height: 1.9; color: #333; max-width: 620px; margin: 0 auto; }
    .cert-member-name { font-family: 'EB Garamond', serif; font-size: 22px; font-weight: 700; color: var(--dark); margin: 10px 0; }
    .cert-amount { font-size: 18px; font-weight: 700; color: var(--red); }
    .cert-meta { margin-top: 18px; font-size: 10.5px; color: var(--gray); display: flex; justify-content: space-between; align-items: flex-end; }
    .cert-qr-box { text-align: center; }
    .cert-qr-box img { width: 74px; height: 74px; display: block; }
    .cert-qr-box .cert-qr-label { font-size: 8px; color: #999; margin-top: 2px; }
    .cert-number { font-weight: 700; }

    .stmt-title { font-size: 14px; font-weight: 700; color: var(--dark); text-transform: uppercase; margin: 34px 0 4px; text-align: center; letter-spacing: 0.6px; }
    .stmt-sub { font-size: 11px; color: var(--gray); text-align: center; margin-bottom: 18px; }

    .fs-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .fs-table td { padding: 3px 4px; vertical-align: top; line-height: 1.5; }
    .col-date { width: 16%; color: #555; }
    .col-desc { width: 54%; color: #111; }
    .col-main { width: 30%; text-align: right; font-weight: 600; }
    .section-header td { font-weight: 700; font-size: 12px; text-transform: uppercase; padding-top: 14px !important; padding-bottom: 4px !important; color: var(--red); border-bottom: 1px solid var(--red); }
    .subtotal-row td { font-weight: 700; border-top: 1px solid var(--line); padding-top: 4px !important; }
    .total-row td { font-weight: 700; font-size: 13px; border-top: 2px solid var(--dark); border-bottom: 3px double var(--dark); padding-top: 6px !important; padding-bottom: 6px !important; color: var(--dark); }
    .empty-row td { color: #999; font-style: italic; font-size: 11.5px; padding-left: 4px; }
    .spacer-row td { padding: 6px 0 !important; }

    .sig-section { margin-top: 60px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .sig-box { text-align: center; flex: 1 1 145px; max-width: 180px; }
    .workflow-sig-space { height: 48px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 3px; }
    .workflow-sig-img { max-width: 155px; max-height: 46px; object-fit: contain; display: block; filter: brightness(0); }
    .workflow-sig-line { border-top: 1px solid var(--dark); margin-bottom: 2px; }
    .workflow-sig-unavailable { font-size: 9px; color: #777; padding-bottom: 5px; }

    .rpt-footer { margin-top: 32px; padding-top: 12px; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 10px; color: #aaa; }

    .placeholder-box { text-align: center; padding: 70px 20px; color: #aaa; }
    .placeholder-box i { font-size: 32px; }

    @page { size: 8.5in 13in; margin: 0.6in 0.65in; }
    @media print {
      .topbar, .controls-bar, .no-print { display: none !important; }
      body { background: white; }
      .report-wrapper { margin: 0; padding: 0; max-width: 100%; }
      .report-page { box-shadow: none; border-radius: 0; padding: 0; margin: 0; }
      .report-page::before { display: none; }
      .sig-section { break-inside: avoid; page-break-inside: avoid; }
      .cert-block { break-inside: avoid; page-break-inside: avoid; }
      .fs-table tr { break-inside: avoid; page-break-inside: avoid; }
      .section-header { break-after: avoid; page-break-after: avoid; }
      body.paper-letter .fs-table { font-size: 11.5px; }
      body.paper-a4 .fs-table { font-size: 11.5px; }
    }
  </style>
</head>
<body>
<div class="topbar no-print">
  <div class="brand">
    <img src="umc-logo.png" alt="UMC Logo" onerror="this.style.display='none'">
    <div>
      <div class="brand-text">GraceBooks</div>
      <div class="brand-sub">Certificate of Giving</div>
    </div>
  </div>
  <div class="top-actions">
    <select id="paper-size-sel" onchange="setPaperSize(this.value)"
      style="padding:7px 10px; border:none; border-radius:6px; font-size:12px; font-weight:600;
             font-family:'Poppins',sans-serif; background:rgba(255,255,255,0.18); color:white; cursor:pointer; outline:none;">
      <option value="long" style="color:#333;">📄 Long Bond (8.5×13)</option>
      <option value="letter" style="color:#333;">📄 Letter (8.5×11)</option>
      <option value="a4" style="color:#333;">📄 A4 (8.27×11.7)</option>
    </select>
    <button class="btn-action btn-print" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
    <button class="btn-action btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Dashboard</button>
  </div>
</div>

<div class="controls-bar no-print" id="treasurer-controls" style="display:none;">
  <div class="controls-row">
    <div class="field-group" style="flex:1; min-width:260px;">
      <label>Member</label>
      <input type="text" id="member-search" placeholder="Search by name or member ID..." autocomplete="off">
      <div id="member-suggestions"></div>
    </div>
    <div class="field-group">
      <label>Period Type</label>
      <div class="toggle-group">
        <button type="button" class="toggle-btn active" data-period="annual" onclick="setPeriodType('annual')">Annual</button>
        <button type="button" class="toggle-btn" data-period="monthly" onclick="setPeriodType('monthly')">Monthly</button>
        <button type="button" class="toggle-btn" data-period="weekly" onclick="setPeriodType('weekly')">Sunday</button>
      </div>
    </div>
    <div class="field-group" id="year-field">
      <label>Year</label>
      <select id="sel-year"></select>
    </div>
    <div class="field-group" id="month-field" style="display:none;">
      <label>Month</label>
      <select id="sel-month">
        <option value="0">January</option><option value="1">February</option><option value="2">March</option>
        <option value="3">April</option><option value="4">May</option><option value="5">June</option>
        <option value="6">July</option><option value="7">August</option><option value="8">September</option>
        <option value="9">October</option><option value="10">November</option><option value="11">December</option>
      </select>
    </div>
    <div class="field-group" id="sunday-field" style="display:none;">
      <label>Sunday Date</label>
      <input type="date" id="sel-sunday">
    </div>
  </div>
  <div class="controls-row">
    <div class="field-group">
      <label>Document</label>
      <div class="toggle-group">
        <button type="button" class="toggle-btn active" data-docmode="certificate" onclick="setDocMode('certificate')">Certificate + Statement</button>
        <button type="button" class="toggle-btn" data-docmode="statement" onclick="setDocMode('statement')">Statement Only</button>
      </div>
    </div>
    <div class="field-group">
      <label>Signature Mode</label>
      <div class="toggle-group">
        <button type="button" class="toggle-btn active" data-sigmode="electronic" onclick="setSigMode('electronic')">Electronic Signature</button>
        <button type="button" class="toggle-btn" data-sigmode="manual" onclick="setSigMode('manual')">Wet Signature (blank line)</button>
      </div>
    </div>
    <div class="field-group" id="include-sig-field" style="display:none;">
      <label>&nbsp;</label>
      <label style="display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--dark); text-transform:none;">
        <input type="checkbox" id="include-sig-checkbox" style="min-width:auto;"> Include signatures
      </label>
    </div>
    <div class="field-group">
      <label>&nbsp;</label>
      <button class="btn-action btn-generate" onclick="generateCertificate()" id="generate-btn">
        <i class="fas fa-certificate"></i> Generate
      </button>
    </div>
  </div>
  <div class="warn-banner" id="unmatched-warning"></div>
</div>

<div class="controls-bar no-print" id="pastor-controls" style="display:none;">
  <div class="controls-row">
    <div class="field-group">
      <label>My Signature Mode</label>
      <div class="toggle-group">
        <button type="button" class="toggle-btn active" data-sigmode="electronic" onclick="setSigMode('electronic')">Electronic Signature</button>
        <button type="button" class="toggle-btn" data-sigmode="manual" onclick="setSigMode('manual')">Wet Signature (blank line)</button>
      </div>
    </div>
  </div>
  <div class="field-group" style="min-width:100%;">
    <label>Issued Certificates — Select One to View or Sign as Pastor</label>
  </div>
  <div class="cert-list" id="pastor-cert-list"><div style="color:#999; font-size:12px;">Loading issued certificates...</div></div>
</div>

<div class="report-wrapper">
  <div class="report-page" id="report-page">
    <div class="placeholder-box">
      <i class="fas fa-certificate"></i>
      <div style="margin-top:12px; font-size:14px;">Select a member and period, then click Generate.</div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCimlS-2_tInj_khQ6KIaeocHYVVK0hwtc",
    authDomain: "gracebooks-7eebc.firebaseapp.com",
    projectId: "gracebooks-7eebc",
    storageBucket: "gracebooks-7eebc.firebasestorage.app",
    messagingSenderId: "423871889231",
    appId: "1:423871889231:web:b2053c9df3517e3c210f3a"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let profile = null;
  let allMembers = [];
  let allIncome = [];
  let allSpecialProjectEntries = [];
  let allEquipment = [];
  let signatories = {
    treasurerLabel: 'Certified by', treasurerName: '', treasurerTitle: 'Church Treasurer',
    pastorLabel: 'Noted by', pastorName: '', pastorTitle: 'Church Pastor'
  };
  let mySignatureProfile = null;

  let periodType = 'annual';
  let docMode = 'certificate';
  let sigMode = 'electronic';
  let selectedMember = null; // { id, name }
  let currentCertDoc = null; // last generated/viewed certificate {id, ...data}

  function fmt(num) { return Number(num || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function peso(num) { return '₱ ' + fmt(num); }
  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }
  function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }

  function parseDate(value) {
    if (!value) return null;
    if (value.seconds) return new Date(value.seconds * 1000);
    const dt = new Date(value);
    return isNaN(dt.getTime()) ? null : dt;
  }
  function sameDay(a, b) {
    return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  }
  function normalizeMemberLookupName(value) {
    return String(value || '').toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
  }
  function memberDisplayName(data) {
    const last = data.last || data.lastName || '';
    const first = data.first || data.firstName || '';
    return `${last}, ${first}`.replace(/^,\s*|\s*,\s*$/g, '').trim() || data.name || '';
  }
  function getMemberId(d) { return String(d.memberId || d.memberID || d.memberCode || '').trim(); }
  function getTitherKey(d) {
    const id = getMemberId(d);
    const member = String(d.member || d.name || '').trim();
    const memberLower = member.toLowerCase();
    if (id.toUpperCase() === 'GENERAL' || ['anonymous','general collection','loose offering'].includes(memberLower)) return '';
    return id || member;
  }
  function recordText(d) {
    return `${d.type || ''} ${d.budgetCategory || ''} ${d.category || ''}`.toLowerCase();
  }
  function isTitheRecord(d) {
    const text = recordText(d);
    return text.includes('tithe') && !text.includes('loose');
  }
  function isPledgeRecord(d) { return recordText(d).includes('pledge'); }
  function isDonationRecord(d) { return recordText(d).includes('donation'); }
  function isLoveGiftRecord(d) { return recordText(d).includes('love gift'); }
  function isSpecialOfferingRecord(d) { return (d.type || '') === 'Special Offering' || recordText(d).includes('special offering'); }

  // ── AUDIT LOG ───────────────────────────────────────────────────────────
  async function writeAuditLog(action, docId, beforeData, afterData, summary) {
    const user = firebase.auth().currentUser;
    await db.collection('auditLogs').add({
      action, collection: 'certificates', docId, summary,
      before: beforeData || null, after: afterData || null,
      actorUid: user ? user.uid : '', actorEmail: user ? user.email : '',
      actorName: profile ? profile.name : '', actorRole: profile ? profile.role : '',
      createdAt: new Date().toISOString()
    });
  }

  // ── PAPER SIZE ──────────────────────────────────────────────────────────
  function setPaperSize(val) {
    document.body.classList.remove('paper-letter', 'paper-a4');
    let css = '@page { size: 8.5in 13in; margin: 0.6in 0.65in; }';
    if (val === 'letter') { document.body.classList.add('paper-letter'); css = '@page { size: 8.5in 11in; margin: 0.5in 0.6in; }'; }
    else if (val === 'a4') { document.body.classList.add('paper-a4'); css = '@page { size: 210mm 297mm; margin: 14mm 16mm; }'; }
    let styleTag = document.getElementById('dynamic-page-size');
    if (!styleTag) { styleTag = document.createElement('style'); styleTag.id = 'dynamic-page-size'; document.head.appendChild(styleTag); }
    styleTag.textContent = css;
  }

  // ── INIT ────────────────────────────────────────────────────────────────
  window.graceBooksAuthReady.then(async (userProfile) => {
    profile = userProfile;
    const isTreasurer = profile.role === 'Treasurer';
    const isPastor = profile.role === 'Pastor';
    if (!isTreasurer && !isPastor) {
      document.getElementById('report-page').innerHTML =
        '<div class="placeholder-box"><i class="fas fa-lock"></i><div style="margin-top:12px; font-size:14px;">Your role does not have access to Certificates of Giving.</div></div>';
      return;
    }
    document.getElementById('treasurer-controls').style.display = isTreasurer ? 'flex' : 'none';
    document.getElementById('pastor-controls').style.display = isPastor ? 'flex' : 'none';

    populateYears();
    document.getElementById('sel-sunday').addEventListener('change', snapToSunday);

    await Promise.all([loadMembers(), loadIncome(), loadSpecialProjectEntries(), loadEquipment(), loadSignatories(), loadMySignatureProfile()]);

    if (isTreasurer) {
      document.getElementById('member-search').addEventListener('input', onMemberSearchInput);
      document.addEventListener('click', (e) => {
        const box = document.getElementById('member-suggestions');
        if (box && !box.contains(e.target) && e.target.id !== 'member-search') box.style.display = 'none';
      });
    } else if (isPastor) {
      await loadPastorCertList();
    }
  });

  function populateYears() {
    const sel = document.getElementById('sel-year');
    const now = new Date().getFullYear();
    for (let y = now + 1; y >= now - 6; y--) sel.innerHTML += `<option value="${y}">${y}</option>`;
    sel.value = String(now);
    document.getElementById('sel-month').value = String(new Date().getMonth());
    document.getElementById('sel-sunday').value = lastSundayISO();
  }

  function lastSundayISO() {
    const d = new Date();
    d.setDate(d.getDate() - d.getDay());
    return d.toISOString().slice(0, 10);
  }

  function snapToSunday() {
    const input = document.getElementById('sel-sunday');
    const dt = new Date(input.value + 'T00:00:00');
    if (isNaN(dt.getTime())) return;
    if (dt.getDay() !== 0) {
      dt.setDate(dt.getDate() - dt.getDay());
      input.value = dt.toISOString().slice(0, 10);
    }
  }

  function setPeriodType(type) {
    periodType = type;
    document.querySelectorAll('[data-period]').forEach(b => b.classList.toggle('active', b.dataset.period === type));
    document.getElementById('year-field').style.display = type === 'weekly' ? 'none' : 'flex';
    document.getElementById('month-field').style.display = type === 'monthly' ? 'flex' : 'none';
    document.getElementById('sunday-field').style.display = type === 'weekly' ? 'flex' : 'none';
  }

  function setDocMode(mode) {
    docMode = mode;
    document.querySelectorAll('[data-docmode]').forEach(b => b.classList.toggle('active', b.dataset.docmode === mode));
    document.getElementById('include-sig-field').style.display = mode === 'statement' ? 'flex' : 'none';
  }

  function setSigMode(mode) {
    sigMode = mode;
    document.querySelectorAll('[data-sigmode]').forEach(b => b.classList.toggle('active', b.dataset.sigmode === mode));
  }

  // ── DATA LOADING ────────────────────────────────────────────────────────
  async function loadMembers() {
    const snap = await db.collection('members').get();
    allMembers = snap.docs.map(doc => {
      const data = doc.data();
      return { id: (data.memberId || doc.id || '').toString().trim(), name: memberDisplayName(data) };
    }).filter(m => m.name);
  }

  async function loadIncome() {
    const snap = await db.collection('income').get();
    allIncome = snap.docs.map(d => d.data()).filter(d => !d.isSpecialProject && d.type !== 'transfer');
  }

  async function loadSpecialProjectEntries() {
    const snap = await db.collection('specialProjectEntries').get();
    allSpecialProjectEntries = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
      .filter(e => e.sourceType === 'Pledge' || e.sourceType === 'Direct Contribution');
  }

  async function loadEquipment() {
    try {
      const snap = await db.collection('equipment').get();
      allEquipment = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    } catch (e) {
      allEquipment = [];
    }
  }

  async function loadSignatories() {
    const doc = await db.collection('settings').doc('signatories').get();
    if (doc.exists) {
      const data = doc.data();
      signatories.treasurerName = data.treasurerName || '';
      signatories.treasurerTitle = data.treasurerTitle || 'Church Treasurer';
      signatories.pastorName = data.pastorName || '';
      signatories.pastorTitle = data.pastorTitle || 'Church Pastor';
    }
  }

  async function loadMySignatureProfile() {
    const doc = await db.collection('userSignatures').doc(profile.uid).get();
    mySignatureProfile = doc.exists ? doc.data() : null;
  }

  // ── MEMBER SEARCH ───────────────────────────────────────────────────────
  function onMemberSearchInput(e) {
    const term = e.target.value.trim().toLowerCase();
    const box = document.getElementById('member-suggestions');
    if (!term) { box.style.display = 'none'; box.innerHTML = ''; selectedMember = null; return; }
    const matches = allMembers.filter(m => m.name.toLowerCase().includes(term) || m.id.toLowerCase().includes(term)).slice(0, 8);
    if (!matches.length) { box.style.display = 'none'; box.innerHTML = ''; return; }
    box.innerHTML = matches.map((m, i) => `
      <div class="member-suggestion-item" data-idx="${i}" onclick="selectMemberSuggestion(${i})">
        ${escapeHtml(m.name)}<span class="ms-code">#${escapeHtml(m.id)}</span>
      </div>`).join('');
    box.dataset.matches = JSON.stringify(matches);
    box.style.display = 'block';
  }

  window.selectMemberSuggestion = function(idx) {
    const box = document.getElementById('member-suggestions');
    const matches = JSON.parse(box.dataset.matches || '[]');
    const match = matches[idx];
    if (!match) return;
    selectedMember = match;
    document.getElementById('member-search').value = `${match.name} (#${match.id})`;
    box.style.display = 'none';
  };

  // ── PERIOD HELPERS ──────────────────────────────────────────────────────
  function currentPeriod() {
    if (periodType === 'annual') {
      const year = document.getElementById('sel-year').value;
      return { type: 'annual', periodKey: year, periodLabel: `Calendar Year ${year}`, year: Number(year) };
    }
    if (periodType === 'monthly') {
      const year = document.getElementById('sel-year').value;
      const month = Number(document.getElementById('sel-month').value);
      const key = `${year}-${String(month + 1).padStart(2, '0')}`;
      return { type: 'monthly', periodKey: key, periodLabel: `${MONTHS[month]} ${year}`, year: Number(year), month };
    }
    const dateStr = document.getElementById('sel-sunday').value;
    const dt = new Date(dateStr + 'T00:00:00');
    const label = dt.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    return { type: 'weekly', periodKey: dateStr, periodLabel: label, sundayDate: dt };
  }

  function inPeriod(dt, period) {
    if (!dt) return false;
    if (period.type === 'annual') return dt.getFullYear() === period.year;
    if (period.type === 'monthly') return dt.getFullYear() === period.year && dt.getMonth() === period.month;
    return sameDay(dt, period.sundayDate);
  }

  // ── STATEMENT BUILD ─────────────────────────────────────────────────────
  function buildStatement(member, period) {
    const rows = { tithes: [], pledges: [], donations: [], specialOfferings: [], other: [], equipment: [] };

    allIncome.forEach(d => {
      if (getTitherKey(d) !== member.id && getTitherKey(d) !== member.name) return;
      const dt = parseDate(d.date);
      if (!inPeriod(dt, period)) return;
      const amount = parseFloat(d.amount || 0);
      const desc = (d.budgetDetails || d.notes || d.budgetCategory || d.type || '').toString();
      const row = { date: d.date, desc, amount };
      if (isTitheRecord(d)) rows.tithes.push(row);
      else if (isPledgeRecord(d)) rows.pledges.push({ ...row, desc: desc || 'Pledge Payment' });
      else if (isDonationRecord(d)) rows.donations.push({ ...row, desc: desc || 'Donation' });
      else if (isSpecialOfferingRecord(d)) rows.specialOfferings.push({ ...row, desc: desc || 'Special Offering' });
      else if (isLoveGiftRecord(d)) rows.other.push({ ...row, desc: desc || 'Love Gift' });
    });

    const unmatchedNames = new Set();
    allSpecialProjectEntries.forEach(e => {
      const dt = parseDate(e.date);
      if (!inPeriod(dt, period)) return;
      const matchesById = e.memberId && e.memberId === member.id;
      const matchesByName = !e.memberId && normalizeMemberLookupName(e.pledgerName || e.party) === normalizeMemberLookupName(member.name);
      if (!e.memberId && (e.pledgerName || e.party)) {
        const norm = normalizeMemberLookupName(e.pledgerName || e.party);
        const knownMember = allMembers.some(m => normalizeMemberLookupName(m.name) === norm);
        if (!knownMember) unmatchedNames.add(e.pledgerName || e.party);
      }
      if (matchesById || matchesByName) {
        rows.pledges.push({
          date: e.date,
          desc: `${e.projectName || 'Special Project'} — ${e.particulars || e.notes || 'Pledge'}`,
          amount: parseFloat(e.amount || 0)
        });
      }
    });

    allEquipment.forEach(eq => {
      if (!eq.donorMemberId || eq.donorMemberId !== member.id) return;
      const dt = parseDate(eq.dateDonated);
      if (!inPeriod(dt, period)) return;
      rows.equipment.push({
        date: eq.dateDonated,
        desc: `${eq.item || 'Equipment'}${eq.description ? ' — ' + eq.description : ''}`,
        amount: parseFloat(eq.valueAtDonation || 0)
      });
    });

    Object.values(rows).forEach(list => list.sort((a, b) => String(a.date || '').localeCompare(String(b.date || ''))));

    const sectionTotal = (list) => list.reduce((s, r) => s + r.amount, 0);
    const cashTotal = sectionTotal(rows.tithes) + sectionTotal(rows.pledges) + sectionTotal(rows.donations) +
      sectionTotal(rows.specialOfferings) + sectionTotal(rows.other);
    const inKindTotal = sectionTotal(rows.equipment);

    return {
      rows,
      sectionTotals: {
        tithes: sectionTotal(rows.tithes), pledges: sectionTotal(rows.pledges), donations: sectionTotal(rows.donations),
        specialOfferings: sectionTotal(rows.specialOfferings), other: sectionTotal(rows.other), equipment: sectionTotal(rows.equipment)
      },
      cashTotal, inKindTotal, grandTotal: cashTotal + inKindTotal,
      unmatchedNames: [...unmatchedNames]
    };
  }

  // ── CERTIFICATE NUMBERING & PERSISTENCE ────────────────────────────────
  async function findExistingCertificate(memberId, periodType, periodKey) {
    const snap = await db.collection('certificates')
      .where('memberId', '==', memberId).where('periodType', '==', periodType).where('periodKey', '==', periodKey)
      .limit(1).get();
    return snap.empty ? null : { id: snap.docs[0].id, ...snap.docs[0].data() };
  }

  async function nextCertNumber(year) {
    const ref = db.collection('settings').doc('certificateCounter');
    return db.runTransaction(async (tx) => {
      const snap = await tx.get(ref);
      const data = snap.exists ? snap.data() : {};
      const seq = (data[year] || 0) + 1;
      tx.set(ref, { ...data, [year]: seq }, { merge: true });
      return `CERT-${year}-${String(seq).padStart(4, '0')}`;
    });
  }

  async function makeMySignature(mode) {
    if (mode === 'electronic' && (!mySignatureProfile || !mySignatureProfile.imageUrl)) {
      throw new Error('Save your electronic signature first in Report Workflow, or choose Wet Signature.');
    }
    return {
      key: profile.role === 'Treasurer' ? 'treasurer' : 'pastor',
      name: profile.name, role: profile.role, uid: profile.uid, mode,
      signatureUrl: mode === 'electronic' ? mySignatureProfile.imageUrl : '',
      signedAt: new Date().toISOString()
    };
  }

  // ── GENERATE (TREASURER) ───────────────────────────────────────────────
  async function generateCertificate() {
    if (!selectedMember) { alert('Please select a member first.'); return; }
    const btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
    try {
      const period = currentPeriod();
      const statement = buildStatement(selectedMember, period);
      const includeSignatures = docMode === 'certificate' || document.getElementById('include-sig-checkbox').checked;

      let signatures = {};
      let certNo = '';
      let issuedAt = new Date().toISOString();

      const existing = await findExistingCertificate(selectedMember.id, periodType, period.periodKey);
      if (existing) {
        certNo = existing.certNo;
        issuedAt = existing.issuedAt;
        signatures = existing.signatures || {};
      } else {
        const yearForNumber = period.year || new Date(period.periodKey).getFullYear() || new Date().getFullYear();
        certNo = await nextCertNumber(yearForNumber);
      }

      if (includeSignatures) {
        signatures.treasurer = await makeMySignature(sigMode);
      }

      const docData = {
        certNo, memberId: selectedMember.id, memberName: selectedMember.name,
        periodType, periodKey: period.periodKey, periodLabel: period.periodLabel,
        docMode, includeSignatures,
        sectionTotals: statement.sectionTotals, cashTotal: statement.cashTotal, inKindTotal: statement.inKindTotal, grandTotal: statement.grandTotal,
        issuedAt, updatedAt: new Date().toISOString(),
        issuedByUid: profile.uid, issuedByName: profile.name,
        signatures, status: 'issued'
      };

      let docId;
      if (existing) {
        await db.collection('certificates').doc(existing.id).set(docData, { merge: true });
        docId = existing.id;
        await writeAuditLog('certificate_regenerated', docId, existing, docData, `Regenerated ${certNo} for ${selectedMember.name} (${period.periodLabel})`);
      } else {
        const ref = await db.collection('certificates').add(docData);
        docId = ref.id;
        await writeAuditLog('certificate_issued', docId, null, docData, `Issued ${certNo} for ${selectedMember.name} (${period.periodLabel})`);
      }

      currentCertDoc = { id: docId, ...docData };
      renderDocument(currentCertDoc, statement);

      const warnBox = document.getElementById('unmatched-warning');
      if (statement.unmatchedNames.length) {
        warnBox.classList.add('show');
        warnBox.innerHTML = `<i class="fas fa-triangle-exclamation"></i> ${statement.unmatchedNames.length} special-project contribution(s) this period have no linked member (names: ${statement.unmatchedNames.map(escapeHtml).join(', ')}). If any belong to ${escapeHtml(selectedMember.name)}, correct the entry in Special Projects.`;
      } else {
        warnBox.classList.remove('show');
        warnBox.innerHTML = '';
      }
    } catch (err) {
      console.error(err);
      alert(err.message || 'Unable to generate certificate.');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-certificate"></i> Generate';
  }

  // ── PASTOR: LIST + SIGN ────────────────────────────────────────────────
  async function loadPastorCertList() {
    const list = document.getElementById('pastor-cert-list');
    try {
      const snap = await db.collection('certificates').orderBy('issuedAt', 'desc').limit(50).get();
      const certs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      if (!certs.length) { list.innerHTML = '<div style="color:#999; font-size:12px;">No certificates issued yet.</div>'; return; }
      list.innerHTML = certs.map(c => `
        <div class="cert-list-item">
          <div>
            <div><strong>${escapeHtml(c.certNo)}</strong> — ${escapeHtml(c.memberName)}</div>
            <div class="meta">${escapeHtml(c.periodLabel)} · ${peso(c.grandTotal)} · ${c.signatures && c.signatures.pastor ? 'Pastor signed' : 'Awaiting pastor signature'}</div>
          </div>
          <div style="display:flex; gap:6px;">
            <button class="btn-small btn-view" onclick="viewCertificate('${c.id}')">View</button>
            <button class="btn-small btn-sign" onclick="pastorSign('${c.id}')" ${c.signatures && c.signatures.pastor ? 'disabled' : ''}>Sign</button>
          </div>
        </div>`).join('');
    } catch (err) {
      console.error(err);
      list.innerHTML = '<div style="color:#c0392b; font-size:12px;">Unable to load certificates.</div>';
    }
  }

  window.viewCertificate = async function(certId) {
    const doc = await db.collection('certificates').doc(certId).get();
    if (!doc.exists) { alert('Certificate not found.'); return; }
    currentCertDoc = { id: doc.id, ...doc.data() };
    const member = { id: currentCertDoc.memberId, name: currentCertDoc.memberName };
    const period = periodFromStoredCert(currentCertDoc);
    const statement = buildStatement(member, period);
    renderDocument(currentCertDoc, statement);
  };

  window.pastorSign = async function(certId) {
    try {
      const doc = await db.collection('certificates').doc(certId).get();
      if (!doc.exists) { alert('Certificate not found.'); return; }
      const before = { id: doc.id, ...doc.data() };
      const signature = await makeMySignature(sigMode || 'electronic');
      const signatures = { ...(before.signatures || {}), pastor: signature };
      await db.collection('certificates').doc(certId).update({ signatures, updatedAt: new Date().toISOString() });
      await writeAuditLog('certificate_pastor_signed', certId, before, { ...before, signatures }, `Pastor signed ${before.certNo}`);
      await loadPastorCertList();
      await viewCertificate(certId);
    } catch (err) {
      console.error(err);
      alert(err.message || 'Unable to sign certificate.');
    }
  };

  function periodFromStoredCert(cert) {
    if (cert.periodType === 'annual') return { type: 'annual', periodKey: cert.periodKey, periodLabel: cert.periodLabel, year: Number(cert.periodKey) };
    if (cert.periodType === 'monthly') {
      const [y, m] = cert.periodKey.split('-');
      return { type: 'monthly', periodKey: cert.periodKey, periodLabel: cert.periodLabel, year: Number(y), month: Number(m) - 1 };
    }
    return { type: 'weekly', periodKey: cert.periodKey, periodLabel: cert.periodLabel, sundayDate: new Date(cert.periodKey + 'T00:00:00') };
  }

  // ── RENDER ──────────────────────────────────────────────────────────────
  function sectionRowsHtml(title, rows) {
    let html = `<tr class="section-header"><td colspan="2">${escapeHtml(title)}</td><td></td></tr>`;
    if (!rows.length) {
      html += `<tr class="empty-row"><td colspan="3">None recorded for this period.</td></tr>`;
    } else {
      rows.forEach(r => {
        html += `<tr><td class="col-date">${escapeHtml(r.date || '')}</td><td class="col-desc">${escapeHtml(r.desc)}</td><td class="col-main">${peso(r.amount)}</td></tr>`;
      });
      const subtotal = rows.reduce((s, r) => s + r.amount, 0);
      html += `<tr class="subtotal-row"><td></td><td>Subtotal</td><td class="col-main">${peso(subtotal)}</td></tr>`;
    }
    html += `<tr class="spacer-row"><td colspan="3"></td></tr>`;
    return html;
  }

  function signatureBlockHtml(cert) {
    const sig = (cert.signatures && cert.signatures.treasurer) || {};
    const sigPastor = (cert.signatures && cert.signatures.pastor) || {};
    const box = (key, s, fallbackName, fallbackTitle, label) => {
      const image = s.signedAt && s.mode === 'electronic' && s.signatureUrl
        ? `<div class="workflow-sig-space"><img class="workflow-sig-img" src="${escapeAttr(s.signatureUrl)}" alt="Signature" onerror="this.parentElement.innerHTML='<span class=&quot;workflow-sig-unavailable&quot;>Signature image unavailable</span>';"></div>`
        : '<div class="workflow-sig-space"></div>';
      const name = fallbackName || s.name || '';
      return `
        <div class="sig-box">
          <div style="text-align:left; font-size:11px; margin-bottom:30px;">${escapeHtml(label)}</div>
          ${image}
          <div class="workflow-sig-line"></div>
          <div style="font-weight:700; font-size:12px;">${escapeHtml(name)}</div>
          <div style="font-size:11px; color:var(--gray);">${escapeHtml(fallbackTitle || '')}</div>
        </div>`;
    };
    return `<div class="sig-section">
      ${box('treasurer', sig, signatories.treasurerName, signatories.treasurerTitle, signatories.treasurerLabel || 'Certified by')}
      ${box('pastor', sigPastor, signatories.pastorName, signatories.pastorTitle, signatories.pastorLabel || 'Noted by')}
    </div>`;
  }

  function buildVerifyUrl(certId) {
    const path = window.location.pathname.replace(/certificate-of-giving\.html$/, 'verify-certificate.html');
    return `${window.location.origin}${path}?id=${certId}`;
  }

  function renderDocument(cert, statement) {
    const page = document.getElementById('report-page');
    const issuedDate = cert.issuedAt ? new Date(cert.issuedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';

    let certHtml = '';
    if (cert.docMode === 'certificate') {
      const qrId = 'qr-' + cert.id;
      certHtml = `
        <div class="cert-block">
          <div class="cert-frame">
            <div class="cert-eyebrow">Tagaytay United Methodist Church</div>
            <div class="cert-headline">Certificate of Giving</div>
            <div class="cert-body">
              This certifies that
              <div class="cert-member-name">${escapeHtml(cert.memberName)}</div>
              has faithfully given a total of
              <div class="cert-amount">${peso(cert.grandTotal)}</div>
              to the ministry and mission of the church for
              <strong>${escapeHtml(cert.periodLabel)}</strong>,
              in gratitude and in service to God's work.
            </div>
            <div class="cert-meta">
              <div>
                <div>Certificate No. <span class="cert-number">${escapeHtml(cert.certNo)}</span></div>
                <div>Issued on ${escapeHtml(issuedDate)}</div>
              </div>
              <div class="cert-qr-box" id="${qrId}">
                <div class="cert-qr-label">Scan to verify</div>
              </div>
            </div>
          </div>
        </div>`;
    }

    const rows = statement.rows;
    const statementHtml = `
      <div class="stmt-title">Statement of Giving</div>
      <div class="stmt-sub">${escapeHtml(cert.memberName)} · ${escapeHtml(cert.periodLabel)}</div>
      <table class="fs-table">
        ${sectionRowsHtml('Tithes', rows.tithes)}
        ${sectionRowsHtml('Pledges', rows.pledges)}
        ${sectionRowsHtml('Donations', rows.donations)}
        ${sectionRowsHtml('Special Offerings', rows.specialOfferings)}
        ${sectionRowsHtml('Other Giving (Love Gifts, etc.)', rows.other)}
        ${sectionRowsHtml('Equipment & In-Kind Donations', rows.equipment)}
        <tr class="subtotal-row"><td></td><td>Cash Giving Total</td><td class="col-main">${peso(statement.cashTotal)}</td></tr>
        <tr class="subtotal-row"><td></td><td>In-Kind Giving Total</td><td class="col-main">${peso(statement.inKindTotal)}</td></tr>
        <tr class="total-row"><td></td><td>Grand Total</td><td class="col-main">${peso(statement.grandTotal)}</td></tr>
      </table>`;

    const includeSig = cert.includeSignatures !== false;

    page.innerHTML = `
      <div class="rpt-header">
        <img src="umc-logo.png" alt="UMC Logo" onerror="this.style.display='none'">
        <div class="rpt-header-text">
          <div class="rpt-church-name">Tagaytay United Methodist Church</div>
          <div class="rpt-church-address">Maglabe Drive, Asisan, Tagaytay City</div>
          <div class="rpt-title">${cert.docMode === 'certificate' ? 'Certificate & Statement of Giving' : 'Statement of Giving'}</div>
          <div class="rpt-period">${escapeHtml(cert.periodLabel)}</div>
        </div>
      </div>
      ${certHtml}
      ${statementHtml}
      ${includeSig ? signatureBlockHtml(cert) : ''}
      <div class="rpt-footer">
        <span>Tagaytay United Methodist Church · Generated by GraceBooks</span>
        <span>Certificate No. ${escapeHtml(cert.certNo || '—')}</span>
      </div>`;

    if (cert.docMode === 'certificate') {
      const qrBox = document.getElementById('qr-' + cert.id);
      if (qrBox && window.qrcode) {
        try {
          const qr = qrcode(0, 'M');
          qr.addData(buildVerifyUrl(cert.id));
          qr.make();
          qrBox.innerHTML = qr.createImgTag(3, 2) + '<div class="cert-qr-label">Scan to verify</div>';
        } catch (e) { console.warn('QR render failed', e); }
      }
    }
  }
</script>
