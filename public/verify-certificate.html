<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Verification — GraceBooks</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    :root { --red: #8B0000; --red-mid: #c0392b; --gold: #c9a84c; --dark: #1a1a1a; --gray: #555; --green: #1e8449; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f0f2f5, #e8e4d8);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; color: var(--dark);
    }
    .card {
      background: white; max-width: 440px; width: 100%; border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15); overflow: hidden;
    }
    .card-header { padding: 26px 28px 18px; text-align: center; border-bottom: 1px solid #eee; }
    .card-header .brand { font-size: 12px; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .card-header .church { font-family: 'EB Garamond', serif; font-size: 18px; font-weight: 700; color: var(--red); }
    .status-box { padding: 30px 28px; text-align: center; }
    .status-icon { font-size: 46px; margin-bottom: 12px; }
    .status-icon.valid { color: var(--green); }
    .status-icon.invalid { color: var(--red-mid); }
    .status-label { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 6px; }
    .status-label.valid { color: var(--green); }
    .status-label.invalid { color: var(--red-mid); }
    .status-msg { font-size: 12.5px; color: var(--gray); }
    .detail-list { padding: 0 28px 26px; }
    .detail-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px dashed #e5e5e5; font-size: 13px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .k { color: var(--gray); }
    .detail-row .v { font-weight: 600; text-align: right; }
    .footer-note { padding: 14px 28px 22px; text-align: center; font-size: 10.5px; color: #aaa; }
    .spinner { font-size: 26px; color: var(--gray); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="brand">GraceBooks Verification</div>
      <div class="church">Tagaytay United Methodist Church</div>
    </div>
    <div id="result-area" class="status-box">
      <div class="spinner"><i class="fas fa-spinner fa-spin"></i></div>
      <div class="status-msg" style="margin-top:10px;">Checking certificate...</div>
    </div>
    <div class="footer-note">This page confirms whether a Certificate of Giving number is genuine. No financial detail beyond the total is shown.</div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCimlS-2_tInj_khQ6KIaeocHYVVK0hwtc",
      authDomain: "gracebooks-7eebc.firebaseapp.com",
      projectId: "gracebooks-7eebc",
      storageBucket: "gracebooks-7eebc.firebasestorage.app",
      messagingSenderId: "423871889231",
      appId: "1:423871889231:web:b2053c9df3517e3c210f3a"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }
    function fmt(num) { return Number(num || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function peso(num) { return '₱ ' + fmt(num); }

    function showInvalid(message) {
      document.getElementById('result-area').innerHTML = `
        <div class="status-icon invalid"><i class="fas fa-circle-xmark"></i></div>
        <div class="status-label invalid">NOT FOUND</div>
        <div class="status-msg">${escapeHtml(message || 'This certificate ID does not match any issued record.')}</div>`;
    }

    function showValid(cert) {
      const issuedDate = cert.issuedAt ? new Date(cert.issuedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '—';
      const signed = cert.signatures && cert.signatures.treasurer && cert.signatures.pastor ? 'Fully signed' : 'Signature pending';
      document.getElementById('result-area').innerHTML = `
        <div class="status-icon valid"><i class="fas fa-circle-check"></i></div>
        <div class="status-label valid">VALID CERTIFICATE</div>
        <div class="status-msg">This Certificate of Giving is genuine.</div>`;
      const list = document.createElement('div');
      list.className = 'detail-list';
      list.innerHTML = `
        <div class="detail-row"><span class="k">Certificate No.</span><span class="v">${escapeHtml(cert.certNo || '—')}</span></div>
        <div class="detail-row"><span class="k">Issued To</span><span class="v">${escapeHtml(cert.memberName || '—')}</span></div>
        <div class="detail-row"><span class="k">Period</span><span class="v">${escapeHtml(cert.periodLabel || '—')}</span></div>
        <div class="detail-row"><span class="k">Total Giving</span><span class="v">${peso(cert.grandTotal)}</span></div>
        <div class="detail-row"><span class="k">Issued On</span><span class="v">${escapeHtml(issuedDate)}</span></div>
        <div class="detail-row"><span class="k">Status</span><span class="v">${escapeHtml(signed)}</span></div>`;
      document.querySelector('.card').insertBefore(list, document.querySelector('.footer-note'));
    }

    async function verify() {
      const params = new URLSearchParams(window.location.search);
      const id = (params.get('id') || '').trim();
      if (!id) { showInvalid('No certificate ID provided.'); return; }
      try {
        const doc = await db.collection('certificates').doc(id).get();
        if (!doc.exists || doc.data().status !== 'issued') { showInvalid(); return; }
        showValid(doc.data());
      } catch (err) {
        console.error(err);
        showInvalid('Unable to verify this certificate right now. Please try again later.');
      }
    }

    verify();
  </script>
</body>
</html>
